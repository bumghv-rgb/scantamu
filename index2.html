<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuestScan Offline Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5;
            --bg: #f8fafc; --card: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --danger: #ef4444;
            --btn-theme-bg: #f1f5f9; --btn-theme-text: #1e293b;
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text-main: #f1f5f9;
            --text-muted: #94a3b8; --border: #334155;
            --btn-theme-bg: #334155; --btn-theme-text: #f1f5f9;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Nav Atas */
        .top-nav { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 1100; pointer-events: none; }
        .nav-btn { pointer-events: auto; background: var(--btn-theme-bg); color: var(--btn-theme-text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 6px; }

        .app-container { width: 100%; max-width: 480px; display: none; flex-direction: column; gap: 20px; margin-top: 60px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .login-box { background: var(--card); padding: 40px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }

        /* Card */
        .card { background: var(--card); border-radius: 28px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        #reader { border-radius: 20px; overflow: hidden; border: 4px solid var(--border) !important; background: #000; }
        #reader__dashboard_section_csr button { background: linear-gradient(135deg, var(--primary), #a855f7) !important; color: white !important; border: none !important; padding: 14px !important; border-radius: 16px !important; cursor: pointer !important; width: 100% !important; font-weight: 800 !important; font-size: 0.9rem !important; text-transform: uppercase; margin-top: 10px !important; }

        /* Grid Data */
        .status-badge { font-size: 0.7rem; font-weight: 800; text-align: center; margin-bottom: 15px; color: var(--primary); letter-spacing: 2px; }
        .data-grid { display: grid; gap: 12px; margin-top: 20px; }
        .data-item { background: var(--bg); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        .data-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .data-val { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        /* Buttons */
        .btn { padding: 16px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        .btn-excel { background: #10b981; color: white; width: 100%; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-clear { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); flex: 1; }

        /* History */
        .history-list { margin-top: 20px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .history-item { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .history-info b { font-size: 0.95rem; color: var(--text-main); display: block; }
        .history-info small { color: var(--text-muted); font-size: 0.75rem; }

        input[type="password"] { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid var(--border); margin-bottom: 20px; background: var(--bg); color: var(--text-main); font-size: 1.2rem; text-align: center; }
    </style>
</head>
<body id="root-body">

<div class="top-nav">
    <button class="nav-btn" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span> <span id="theme-text">Mode Gelap</span>
    </button>
    <button id="logout-btn" class="nav-btn" style="display:none; color:var(--danger);" onclick="logout()">
        <span>Keluar</span> 🚪
    </button>
</div>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin:0 0 10px 0; font-weight:800; font-size:1.8rem; letter-spacing:-1px;">Scan <span style="color:var(--primary)">Tamu</span></h2>
        <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:25px;">Registrasi Tamu</p>
        <input type="password" id="pin-input" placeholder="••••">
        <button onclick="checkAuth()" class="btn btn-excel" style="background:var(--primary);">Masuk Sistem</button>
    </div>
</div>

<div class="app-container" id="main-app">
    <div style="text-align: center;">
        <h2 style="margin:0; font-weight:800; letter-spacing:-1px;">Registrasi <span style="color:var(--primary)">Tamu</span></h2>
    </div>

    <div class="card">
        <div id="scan-status" class="status-badge">SIAP PINDAI</div>
        <div id="reader"></div>
        
        <div class="data-grid">
            <div class="data-item">
                <span class="data-label">Nama Lengkap</span>
                <span id="disp-nama" class="data-val">-</span>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="data-item">
                    <span class="data-label">Asal Alamat</span>
                    <span id="disp-asal" class="data-val">-</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Jumlah Orang</span>
                    <span id="disp-jumlah" class="data-val">-</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 15px 0; font-size:1.1rem; font-weight:800;">Manajemen Laporan</h3>
        <button class="btn btn-excel" onclick="downloadExcel()">📥 Download Laporan Excel (CSV)</button>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-clear" onclick="hapusRiwayat()">🗑️ Reset Riwayat</button>
            <button class="btn" style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text-muted);" onclick="window.print()">🖨️ Cetak</button>
        </div>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('v_offline_logs')) || [];

    // TEMA
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('v_offline_theme', isDark ? 'dark' : 'light');
        updateThemeUI(isDark);
    }
    function updateThemeUI(isDark) {
        document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        document.getElementById('theme-text').innerText = isDark ? 'Mode Terang' : 'Mode Gelap';
    }
    if(localStorage.getItem('v_offline_theme') === 'dark') { document.body.classList.add('dark-mode'); updateThemeUI(true); }

    // SOUND SYSTEM
    function playBeep() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.type = "sine";
        osc.frequency.value = 880;
        osc.connect(gain);
        gain.connect(context.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 0.5);
        osc.stop(context.currentTime + 0.5);
    }

    // LOGIN
    function checkAuth() {
        if(document.getElementById('pin-input').value === "van1123") {
            localStorage.setItem('v_offline_auth', 'true');
            startApp();
        } else { alert("PIN Salah!"); }
    }
    function logout() { localStorage.removeItem('v_offline_auth'); location.reload(); }
    
    function startApp() {
        if(localStorage.getItem('v_offline_auth') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'flex';
            renderHistory();
            initQR();
        }
    }

    // SCANNER
    function initQR() {
        const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        scanner.render((text) => {
            playBeep();
            const parts = text.split(",");
            const n = parts[0] ? parts[0].trim() : "Tamu Umum";
            const a = parts[1] ? parts[1].trim() : "-";
            const j = parts[2] ? parts[2].trim() : "1";
            
            const now = new Date();
            const t = now.getDate() + "/" + (now.getMonth()+1) + "/" + now.getFullYear() + " " + now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

            document.getElementById('disp-nama').innerText = n;
            document.getElementById('disp-asal').innerText = a;
            document.getElementById('disp-jumlah').innerText = j;

            saveData(n, a, j, t);
        });
    }

    function saveData(n, a, j, t) {
        logs.unshift({ n, a, j, t });
        localStorage.setItem('v_offline_logs', JSON.stringify(logs));
        renderHistory();
        document.getElementById('scan-status').innerText = "BERHASIL DISIMPAN";
        document.getElementById('scan-status').style.color = "var(--success)";
        setTimeout(() => { document.getElementById('scan-status').innerText = "SIAP PINDAI"; document.getElementById('scan-status').style.color = "var(--primary)"; }, 2000);
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if(logs.length === 0) { list.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:15px;">Belum ada riwayat.</p>'; return; }
        list.innerHTML = logs.map(item => `
            <div class="history-item">
                <div class="history-info"><b>${item.n}</b><small>${item.t}</small></div>
                <div style="font-weight:800; color:var(--primary)">${item.j}</div>
            </div>
        `).join('');
    }

    function hapusRiwayat() {
        if(confirm("Hapus semua riwayat lokal?")) { logs = []; localStorage.removeItem('v_offline_logs'); renderHistory(); }
    }

    function downloadExcel() {
        if(logs.length === 0) return alert("Data kosong!");
        let csv = "sep=,\nNama Tamu,Alamat,Jumlah,Waktu Scan\n"; 
        logs.forEach(r => {
            csv += `"${r.n.replace(/"/g, '""')}","${r.a.replace(/"/g, '""')}","${r.j}","${r.t}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Laporan_Tamu.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    if(localStorage.getItem('v_offline_auth') === 'true') startApp();
</script>
</body>
</html>
