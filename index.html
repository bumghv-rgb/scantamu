<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Premium v6</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-rose">

    <div id="notif"></div>

    <div class="app-container">
        <div class="header">
            <h1>Wedding Guest</h1>
            <div class="theme-selector">
                <div class="dot-theme" style="background: #E5B4A2;" onclick="setTheme('rose')"></div>
                <div class="dot-theme" style="background: #D4AF37;" onclick="setTheme('midnight')"></div>
                <div class="dot-theme" style="background: #6B8E23;" onclick="setTheme('forest')"></div>
            </div>
        </div>

        <div class="scanner-wrapper">
            <div id="reader"></div>
            <div id="lock-screen">
                <div style="font-size: 40px;">💌</div>
                <h2 id="modal-nama" style="margin: 15px 0 5px 0; font-family: 'Playfair Display';"></h2>
                <div id="modal-doa" class="doa-card"></div>
                <small style="color: var(--primary); letter-spacing: 2px; font-weight: 600;">KEHADIRAN ANDA ADALAH KADO TERINDAH</small>
            </div>
        </div>

        <div class="action-grid">
            <label for="input-file" class="btn btn-outline">📷 Galeri</label>
            <button class="btn btn-main" onclick="downloadExcel()">📥 Export</button>
            <input type="file" id="input-file" accept="image/*" style="display:none">
        </div>

        <div class="list-header">
            <span style="font-weight: 600; font-size: 14px;">Daftar Tamu</span>
            <span class="badge" id="count-tamu">0 Hadir</span>
        </div>

        <div id="guest-list-container" style="max-height: 350px; overflow-y: auto;">
            </div>

        <div style="text-align: center; margin-top: 30px;">
            <p onclick="clearAllData()" style="font-size: 10px; color: var(--text-light); text-decoration: underline; cursor: pointer; opacity: 0.5;">Hapus Seluruh Database</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
